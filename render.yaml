databases:
  - name: digit-db
    databaseName: digit
    user: digit
    plan: free

services:
  - type: web
    name: digit-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/site-content/default
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: digit-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      # Set MONGO_URI once to import existing MongoDB data, then remove it
      # - key: MONGO_URI
      #   sync: false
